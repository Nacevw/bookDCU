<!-- load statis -->
{% load static %}
<!-- load in the static CSS file -->
<link rel="stylesheet" href="{% static '/css/style.css' %}">

<!-- add a footer that is pinned to the bottom of the screen -->
<footer class="footer">

	<!-- Icon source: https://www.iconfinder.com/iconsets/social-media-circle-7 -->
	<div class="footer-icons">
		<a href="https://facebook.com" target="_blank"><img src="{% static '/img/facebook-icon.svg' %}"
				alt="Visit us on Facebook"></a>
		<a href="https://twitter.com" target="_blank"><img src="{% static '/img/twitter-icon.svg' %}"
				alt="Visit us on Twitter"></a>
		<a href="https://instagram.com" target="_blank"><img src="{% static '/img/instagram-icon.svg' %}"
				alt="Visit us on Instagram"></a>
		<a href="https://youtube.com" target="_blank"><img src="{% static '/img/youtube-icon.svg' %}"
				alt="Visit us on YouTube"></a>

	<p>Copyright &copy;

	</p>
</footer>
